<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="wrapper">
        <header class="row-header">
            <div class="col-nama">Arul store</div>
            <div class="col-logo"><img src="asset/aruln11.png" alt="logo toko"></div>
        </header>

        <section class="row-body">
            
            <main class="col-main">
                
                <div id="halaman-utama">
                    <div class="grid-produk">
                        <div class="produk-item" onclick="bukaDetail('Produk 1', 'asset/adezore.png')">
                            <img src="asset/adezore.png" alt="Produk 1">
                            <div>adidas adezore</div>
                        </div>
                        <div class="produk-item" onclick="bukaDetail('Produk 2', 'asset/dagger.png')">
                            <img src="asset/dagger.png" alt="produk 2">
                            <div>puma dagger</div>
                        </div>
                        <div class="produk-item" onclick="bukaDetail('Produk 3', 'asset/flourish.png')">
                            <img src="asset/flourish.png" alt="produk 3">
                            <div>puma flourish</div>
                        </div>
                        <div class="produk-item" onclick="bukaDetail('Produk 4', 'asset/pegasus1.png')">
                            <img src="asset/pegasus1.png"  alt="produk 4">
                            <div>nike pegasus1</div>
                        </div>
                        <div class="produk-item" onclick="bukaDetail('Produk 5', 'asset/sabrina3ep.png')">
                            <img src="asset/sabrina3ep.png" alt="produk 5">
                            <div>nike sabrina3ep</div>
                        </div>
                        <div class="produk-item" onclick="bukaDetail('Produk 6', 'asset/evo2.png')">
                            <img src="asset/evo2.png" alt="produk 6">
                            <div>adidas evo2</div>
                        </div>
                    </div>
                </div>

                <div id="halaman-detail">
                    
                    <div class="detail-deskripsi">
                        <div class="teks-tengah">
                            <span id="teks-deskripsi-default"></span>
                            <p id="nama-produk-teks" style="display: none; margin-top:10px;"></p>
                        </div>
                        
                        <div class="btn-wrapper">
                            <button class="btn-kembali" onclick="kembaliKeUtama()">BUTTON KEMBALI</button>
                        </div>
                    </div>

                    <div class="detail-gambar-box">
                        <span id="teks-gambar-default"></span>
                        <img id="gambar-produk-detail" src="" alt="Gambar Detail" style="display: none;">
                    </div>

                </div>

            </main>

            <aside class="col-sidebar">
                <div class="logo-produk"> <img src="asset/nike.png" alt="logo 1"></div>
                <div class="logo-produk"> <img src="asset/adidas.png" alt="logo 2"></div>
                <div class="logo-produk"> <img src="asset/puma.png" alt="logo 3"></div>
            </aside>

        </section>

        <footer class="row-footer">
            FOOTER
        </footer>
    </div>

    <script src="index.js"></script>

</body>
</html>
